<!DOCTYPE html>
<html>
<head>
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

    <div class="sidebar">

        <h2>Job Tracker</h2>

        <div class="stat-box">
            <h3>Total</h3>
            <p id="totalCount">0</p>
        </div>

        <div class="stat-box">
            <h3>Applied</h3>
            <p id="appliedCount">0</p>
        </div>

        <div class="stat-box">
            <h3>Interview</h3>
            <p id="interviewCount">0</p>
        </div>

        <div class="stat-box">
            <h3>Rejected</h3>
            <p id="rejectedCount">0</p>
        </div>

        <div class="stat-box">
            <h3>Offers</h3>
            <p id="offerCount">0</p>
        </div>

        <button id="logoutBtn" onclick="logout()">
            Logout
        </button>

    </div>

    <div class="main-content">

        <h1>Job Application Tracker</h1>

        <form id="jobForm">

            <input
                type="text"
                id="company"
                placeholder="Company Name"
                required
            >

            <input
                type="text"
                id="role"
                placeholder="Job Role"
                required
            >

            <select id="status">
                <option value="Applied">Applied</option>
                <option value="Interview Scheduled">Interview Scheduled</option>
                <option value="Rejected">Rejected</option>
                <option value="Offer Received">Offer Received</option>
            </select>

            <button type="submit">
                Add Application
            </button>

        </form>

        <input
            type="text"
            id="searchInput"
            placeholder="Search by company..."
            onkeyup="loadJobs()"
        >

        <select id="filterStatus" onchange="loadJobs()">
            <option value="All">All Status</option>
            <option value="Applied">Applied</option>
            <option value="Interview Scheduled">Interview Scheduled</option>
            <option value="Rejected">Rejected</option>
            <option value="Offer Received">Offer Received</option>
        </select>

        <div id="applications"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
